stages:
  - prepare
  - setup
  - icosa:tab
  - icosa:atv

#
# PREPARE STAGE
#
prepare:
  image: docker:dind
  stage: prepare
  services:
    - name: docker:dind
  script:
    - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - docker build -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}" .
    - docker push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}"

#
# SETUP STAGE
#
setup:
  image: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}"
  stage: setup
  services:
    - docker:dind
  variables:
    LINEAGE_BRANCH: "lineage-17.1"
    MANIFEST_BRANCH: "lineage-17.1-icosa_sr"
  script:
    - mkdir -p /build/android/lineage; cd /build/android/lineage
    - repo init -u https://github.com/LineageOS/android.git -b "${LINEAGE_BRANCH}"
    - git clone --recurse-submodules -j8 https://gitlab.com/switchroot/android/manifest.git -b "${MANIFEST_BRANCH}" .repo/local_manifests || echo Manifest already present--snacking now.
    - .repo/local_manifests/snack/snack.sh -y

#
# BUILD JOB TEMPLATE
#
.build:
  image: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}"
  services:
    - docker:dind
  variables:
    BUILD_TYPE: ""
    TYPE: ""
  before_script:
    - rm out/target/product/icosa_sr/lineage-1*.1-*-UNOFFICIAL-*.zip || true
  script:
    - cd /build/android/lineage
    - source build/envsetup.sh
    - lunch "${BUILD_TYPE}"
    - make installclean
    - mka bacon
    - zip -j ${CI_PROJECT_DIR}/icosa-${TYPE}-$(date +'%Y%m%d')-dev.zip out/target/product/icosa_sr/lineage-1*.1-*-UNOFFICIAL-*.zip out/target/product/icosa_sr/boot.img out/target/product/icosa_sr/install/*.dtb
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/icosa-${TYPE}-*-dev.zip
#
# ICOSA TAB
#
icosa-tab:
  extends: .build
  stage: icosa:tab
  variables:
    BUILD_TYPE: "lineage_icosa_sr-userdebug"
    TYPE: "tab"

#
# ICOSA TV
#
icosa-atv:
   extends: .build
   stage: icosa:atv
   variables:
     BUILD_TYPE: "lineage_icosa_tv_sr-userdebug"
     TYPE: "atv"
