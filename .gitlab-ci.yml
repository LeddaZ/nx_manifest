stages:
  - dependency_build
  - build

deploy:
  image: docker:19.03.12
  stage: dependency_build
  services:
    - name: docker:19.03.12-dind
  script:
    - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH"

.build:
  image: "$CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH"
  stage: build
  services:
    - docker:dind
  variables:
      LUNCH: ""
  script:
    - repo init -u https://github.com/LineageOS/android.git -b lineage-17.1
    - git clone https://gitlab.com/switchroot/android/manifest.git -b lineage-17.1-icosa_sr .repo/local_manifests
    - rm -rf /build/android/output/*
    - .repo/local_manifests/snack/snack.sh -y
    - source build/envsetup.sh
    - lunch ${LUNCH}
    - make bacon
    - mkdir -p artifacts
    - cp -r /build/android/output/* artifacts/
  artifacts:
    paths:
      - artifacts/

icosa-build:
  extends: .build
  variables:
      LUNCH: "lineage_icosa_sr-userdebug"

maru-icosa-build:
    extends: .build
    variables:
        LUNCH: "maru_icosa_sr-userdebug"
